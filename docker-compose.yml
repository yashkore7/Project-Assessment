services:
  app:
    build: .
    container_name: devops-node-app
    ports:
      - "3000:5000"
    environment:
      NODE_ENV: production
      PORT: 3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 10s
      retries: 3s
